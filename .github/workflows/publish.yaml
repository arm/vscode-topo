name: Publish

on:
    workflow_dispatch:
        inputs:
            pre-release:
                type: boolean
                description: Pre-release
                default: false

env:
    NODE_VERSION: 22.x
    PRE_RELEASE_FLAG: ${{ inputs.pre-release && '--pre-release' || '' }}

jobs:
    ci:
        uses: ./.github/workflows/ci.yaml
        secrets: inherit

    prepare-version:
        name: Prepare Version
        needs: ci
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.calculate-version.outputs.version }}
        steps:
            - id: get-app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.TOPO_ACCESS_APP_ID }}
                  private-key: ${{ secrets.TOPO_ACCESS_APP_PRIVATE_KEY }}
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - name: Install NPM dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ steps.get-app-token.outputs.token }}
            - name: Detect changes since last release to decide major, minor, patch or pre-release
              id: detect-changes
              run: |
                  if [ "$PRE_RELEASE_FLAG" = "--pre-release" ]; then
                      echo "release-type=Pre-release" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  CURRENT_VERSION=$(go run github.com/caarlos0/svu/v3@v3.4.0 current --json || echo '{"major":0,"minor":0,"patch":0}')

                  IS_FIRST_RELEASE=$(jq -r '(.major == 0 and .minor == 0 and .patch == 0)' <<< "$CURRENT_VERSION")
                  echo "is-first-release=$IS_FIRST_RELEASE" >> "$GITHUB_OUTPUT"

                  NEXT_VERSION=$(go run github.com/caarlos0/svu/v3@v3.4.0 next --json --v0)

                  CURRENT_MAJOR=$(jq -r .major <<< "$CURRENT_VERSION")
                  CURRENT_MINOR=$(jq -r .minor <<< "$CURRENT_VERSION")
                  CURRENT_PATCH=$(jq -r .patch <<< "$CURRENT_VERSION")
                  NEXT_MAJOR=$(jq -r .major <<< "$NEXT_VERSION")
                  NEXT_MINOR=$(jq -r .minor <<< "$NEXT_VERSION")
                  NEXT_PATCH=$(jq -r .patch <<< "$NEXT_VERSION")

                  if [ "$NEXT_MAJOR" -gt "$CURRENT_MAJOR" ]; then
                      RELEASE_TYPE=Major
                  elif [ "$NEXT_MINOR" -gt "$CURRENT_MINOR" ]; then
                      RELEASE_TYPE=Minor
                  elif [ "$NEXT_PATCH" -gt "$CURRENT_PATCH" ]; then
                      RELEASE_TYPE=Patch
                  else
                      RELEASE_TYPE=None
                  fi

                  echo "release-type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
            - name: Calculate Version
              id: calculate-version
              env:
                  RELEASE_TYPE: ${{ steps.detect-changes.outputs.release-type }}
              run: |
                  VERSION=$(npm run calculate-new-version --silent)
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            - name: Update extension version
              if: steps.calculate-version.outputs.version
              run: npm version --no-git-tag-version ${{ steps.calculate-version.outputs.version }}
            - name: Generate release notes and changelog
              if: steps.calculate-version.outputs.version
              run: |
                  NOTES_FILE="$RUNNER_TEMP/generated-release-notes.md"
                  if [ "$IS_FIRST_RELEASE" = "true" ]; then
                      printf 'Initial release.\n' > "$NOTES_FILE"
                  else
                      gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
                          --field tag_name="v$VERSION" \
                          --field target_commitish="$GITHUB_SHA" \
                          --jq .body > "$NOTES_FILE"
                  fi
                  sed -E -i \
                      "s| by @[[:alnum:]_-]+(\\[bot\\])? in https://github.com/${GITHUB_REPOSITORY}/pull/([0-9]+)| (#\\2)|g" \
                      "$NOTES_FILE"
                  awk '
                      /^## New Contributors$/ { skip = 1; next }
                      skip && /^\*\*Full Changelog\*\*/ { skip = 0 }
                      skip && /^## / { skip = 0 }
                      !skip { print }
                  ' "$NOTES_FILE" > "$NOTES_FILE.tmp"
                  mv "$NOTES_FILE.tmp" "$NOTES_FILE"

                  cp "$NOTES_FILE" release-notes.md

                  {
                      sed -n '1,/^## /{ /^## /q; p; }' CHANGELOG.md
                      printf '\n## %s\n\n' "$VERSION"
                      cat "$NOTES_FILE"
                      printf '\n\n'
                      sed -n '/^## /,$p' CHANGELOG.md
                  } > CHANGELOG.md.new
                  mv CHANGELOG.md.new CHANGELOG.md
              env:
                  VERSION: ${{ steps.calculate-version.outputs.version }}
                  IS_FIRST_RELEASE: ${{ steps.detect-changes.outputs.is-first-release }}
                  GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
            - name: Store release notes
              if: steps.calculate-version.outputs.version
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: release-notes
                  path: ./release-notes.md
                  if-no-files-found: error
            - name: Create version bump patch
              if: steps.calculate-version.outputs.version
              run: git diff > new-version.patch
            - name: Store version bump patch
              if: steps.calculate-version.outputs.version
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: new-version-patch
                  path: ./new-version.patch
                  if-no-files-found: error
    build:
        name: Build ${{ matrix.platform }}
        needs:
            - ci
            - prepare-version
        runs-on: ubuntu-latest
        strategy:
            matrix:
                platform:
                    - win32-x64
                    - linux-x64
                    - linux-arm64
                    - darwin-arm64
        steps:
            - id: get-app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.TOPO_ACCESS_APP_ID }}
                  private-key: ${{ secrets.TOPO_ACCESS_APP_PRIVATE_KEY }}
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - name: Download version bump patch
              if: needs.prepare-version.outputs.version
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: new-version-patch
                  path: ~/patches
            - name: Apply version bump patch
              if: needs.prepare-version.outputs.version
              run: git apply ~/patches/new-version.patch
            - name: Install NPM dependencies
              env:
                  GITHUB_TOKEN: ${{ steps.get-app-token.outputs.token }}
              run: npm ci
            - name: Download other dependencies
              run: npm run download -- --target ${{ matrix.platform }}
            - name: Package VSIX
              run: npm run package -- --target ${{ matrix.platform }} $PRE_RELEASE_FLAG
            - name: Upload VSIX
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: vsix-package-${{ matrix.platform }}
                  path: ./*${{ matrix.platform }}*.vsix
                  retention-days: 1
                  if-no-files-found: error

    push-new-version:
        name: Push New Version
        needs:
            - prepare-version
            - build
        if: needs.prepare-version.outputs.version
        runs-on: ubuntu-latest
        outputs:
            release_commit: ${{ steps.commit-version.outputs.release_commit }}
        steps:
            - id: get-app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.TOPO_ACCESS_APP_ID }}
                  private-key: ${{ secrets.TOPO_ACCESS_APP_PRIVATE_KEY }}
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
              with:
                  token: ${{ steps.get-app-token.outputs.token }}
            - name: Download version bump patch
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: new-version-patch
                  path: ~/patches
            - name: Apply version bump patch
              run: git apply ~/patches/new-version.patch
            - name: Set git config for Extensions Repo bot
              run: |
                  git config --global user.email "135710658+extensions-repo-access[bot]@users.noreply.github.com"
                  git config --global user.name "extensions-repo-access[bot]"
            - name: Commit new version
              id: commit-version
              run: |
                  git commit -a -m "chore: ${{ needs.prepare-version.outputs.version }} release"
                  COMMIT=$(git rev-parse HEAD)
                  echo "release_commit=$COMMIT" >> "$GITHUB_OUTPUT"
            - name: Push changes
              run: git push origin HEAD:${{ github.ref_name }}

    release:
        name: Release
        needs:
            - prepare-version
            - build
            - push-new-version
        if: needs.prepare-version.outputs.version
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  path: artifacts
            - name: Download release notes
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: release-notes
                  path: release-notes
            - name: Release
              uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
              with:
                  files: artifacts/*/*.vsix
                  body_path: release-notes/release-notes.md
                  tag_name: v${{ needs.prepare-version.outputs.version }}
                  target_commitish: ${{ needs.push-new-version.outputs.release_commit }}
                  prerelease: ${{ inputs.pre-release }}

    publish:
        name: Publish
        needs:
            - prepare-version
            - release
        if: needs.prepare-version.outputs.version
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  pattern: vsix-package-*
                  merge-multiple: true
                  path: artifacts
            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - name: Publish to VS Code Marketplace
              run: npx @vscode/vsce@3.9.2 publish -i artifacts/*.vsix -p ${{secrets.VS_MARKETPLACE_TOKEN}} $PRE_RELEASE_FLAG
            - name: Publish to Open VSX
              run: npx ovsx@0.8.0 publish -i artifacts/*.vsix -p ${{secrets.OPEN_VSX_TOKEN}} $PRE_RELEASE_FLAG
